<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 日报</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f23;
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }
        
        /* Top Bar */
        .top-bar {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        
        .top-bar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00aaff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .date-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .date-selector label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .date-selector select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s ease;
            min-width: 180px;
        }
        
        .date-selector select:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .date-selector select:focus {
            outline: none;
            border-color: #00aaff;
        }
        
        .date-selector select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        .go-btn {
            background: linear-gradient(135deg, #0066ff, #00aaff);
            border: none;
            border-radius: 10px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s ease;
        }
        
        .go-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.4);
        }
        
        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .iframe-container {
            width: 100%;
            min-height: calc(100vh - 80px);
            border: none;
        }
        
        .iframe-container iframe {
            width: 100%;
            min-height: calc(100vh - 80px);
            border: none;
            background: transparent;
        }
        
        /* Error message */
        .error-msg {
            text-align: center;
            padding: 100px 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .error-msg h2 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #fff;
        }
        
        .error-msg p {
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .top-bar-inner {
                justify-content: center;
            }
            
            .logo {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <div class="logo">🤖 AI 日报</div>
            <div class="date-selector">
                <label>📅</label>
                <select id="dateSelect"></select>
                <button class="go-btn" onclick="loadReport()">查看</button>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div id="contentArea" class="iframe-container">
            <!-- 日报将通过iframe加载 -->
        </div>
    </div>
    
    <script>
        // 获取今天日期 YYYY-MM-DD
        function getTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // 从URL获取日期
        function getDateFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('date') || getTodayDate();
        }
        
        // 生成日期选项（最近30天）
        function generateDateOptions() {
            const select = document.getElementById('dateSelect');
            const today = new Date();
            
            for (let i = 0; i < 30; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const dateStr = `${year}-${month}-${day}`;
                
                const option = document.createElement('option');
                option.value = dateStr;
                const displayDate = `${year}年${month}月${day}日`;
                option.textContent = i === 0 ? `${displayDate} (今日)` : displayDate;
                select.appendChild(option);
            }
        }
        
        // 加载日报
        function loadReport() {
            const date = document.getElementById('dateSelect').value;
            const contentArea = document.getElementById('contentArea');
            
            // 更新URL
            const url = new URL(window.location.href);
            url.searchParams.set('date', date);
            window.history.pushState({}, '', url);
            
            // 加载日报（使用iframe确保HTML正确渲染）
            contentArea.innerHTML = `
                <iframe src="reports/${date}.html" 
                        onload="this.style.opacity='1'" 
                        style="opacity:0; transition: opacity 0.5s ease;"
                        frameborder="0" 
                        scrolling="auto">
                </iframe>
            `;
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            generateDateOptions();
            
            // 设置选中当前日期
            const selectedDate = getDateFromUrl();
            document.getElementById('dateSelect').value = selectedDate;
            
            // 加载日报
            loadReport();
        });
    </script>
</body>
</html>
